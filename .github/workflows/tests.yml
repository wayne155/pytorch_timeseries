name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'webapp/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'webapp/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"
          pip install prettytable torchmetrics einops pandas scikit-learn sktime fire PyYAML

      - name: Run tests
        run: pytest tests/ -q --tb=short -x
